<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" fill="none">
  <defs>
    <!-- Checkered pattern for flags -->
    <pattern id="checker" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#f5f5f5"/>
      <rect x="4" width="4" height="4" fill="#1a1a1a"/>
      <rect y="4" width="4" height="4" fill="#1a1a1a"/>
      <rect x="4" y="4" width="4" height="4" fill="#f5f5f5"/>
    </pattern>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E84444"/>
      <stop offset="100%" stop-color="#B01E1E"/>
    </linearGradient>
    <!-- Flag shadow -->
    <linearGradient id="flagFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Left checkered flag -->
  <g transform="translate(95, 18) rotate(-25, 0, 0)">
    <path d="M0 0 L-40 -8 L-38 22 L2 28 Z" fill="url(#checker)" opacity="0.7"/>
    <path d="M0 0 L-40 -8 L-38 22 L2 28 Z" fill="none" stroke="#333" stroke-width="0.5"/>
  </g>

  <!-- Right checkered flag -->
  <g transform="translate(165, 18) rotate(25, 0, 0)">
    <path d="M0 0 L40 -8 L38 22 L-2 28 Z" fill="url(#checker)" opacity="0.7"/>
    <path d="M0 0 L40 -8 L38 22 L-2 28 Z" fill="none" stroke="#333" stroke-width="0.5"/>
  </g>

  <!-- Stars arching above shield -->
  <g fill="#D42B2B">
    <polygon points="105,8 106.5,12.5 111,12.5 107.5,15.5 109,20 105,17 101,20 102.5,15.5 99,12.5 103.5,12.5" transform="scale(0.6) translate(30,-2)"/>
    <polygon points="120,3 121.5,7.5 126,7.5 122.5,10.5 124,15 120,12 116,15 117.5,10.5 114,7.5 118.5,7.5" transform="scale(0.7) translate(33,0)"/>
    <polygon points="140,1 142,6.5 148,6.5 143.5,10 145.5,15.5 140,12 134.5,15.5 136.5,10 132,6.5 138,6.5" transform="scale(0.8) translate(10,0)"/>
    <polygon points="160,3 161.5,7.5 166,7.5 162.5,10.5 164,15 160,12 156,15 157.5,10.5 154,7.5 158.5,7.5" transform="scale(0.7) translate(32,0)"/>
    <polygon points="175,8 176.5,12.5 181,12.5 177.5,15.5 179,20 175,17 171,20 172.5,15.5 169,12.5 173.5,12.5" transform="scale(0.6) translate(82,-2)"/>
  </g>

  <!-- Shield shape (heraldic) -->
  <path d="M130 14 C130 14 108 14 108 14 C105 14 103 16 103 19 L103 48 C103 56 115 66 130 72 C145 66 157 56 157 48 L157 19 C157 16 155 14 152 14 Z" fill="url(#shieldGrad)"/>
  <!-- Shield inner border -->
  <path d="M130 18 C130 18 112 18 112 18 C110 18 108 19.5 108 22 L108 47 C108 53 118 62 130 67 C142 62 152 53 152 47 L152 22 C152 19.5 150 18 148 18 Z" fill="#0a0a0a"/>
  <!-- Shield inner red -->
  <path d="M130 22 C130 22 116 22 116 22 C114.5 22 113 23 113 25 L113 46 C113 51 121 58 130 62 C139 58 147 51 147 46 L147 25 C147 23 145.5 22 144 22 Z" fill="url(#shieldGrad)" opacity="0.15"/>

  <!-- "auto" text inside shield -->
  <text x="130" y="42" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-style="italic" font-size="18" fill="#ffffff" text-anchor="middle" letter-spacing="1">auto</text>
  <!-- Small line under auto -->
  <line x1="117" y1="47" x2="143" y2="47" stroke="#D42B2B" stroke-width="1.5"/>
  <!-- "FANATICS" text inside shield lower -->
  <text x="130" y="60" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="11" fill="#f5f5f5" text-anchor="middle" letter-spacing="2.5">FANATICS</text>

  <!-- "AUTO" text left of shield -->
  <text x="95" y="88" font-family="system-ui, -apple-system, sans-serif" font-weight="300" font-size="9" fill="#a0a0a0" text-anchor="end" letter-spacing="4">PREMIUM</text>

  <!-- "DETAILING STUDIO" text right of shield -->
  <text x="165" y="88" font-family="system-ui, -apple-system, sans-serif" font-weight="300" font-size="9" fill="#a0a0a0" text-anchor="start" letter-spacing="4">DETAILING</text>

  <!-- Divider dots -->
  <circle cx="130" cy="85" r="1.5" fill="#D42B2B"/>
</svg>
